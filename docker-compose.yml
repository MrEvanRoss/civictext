version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: civictext-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: civictext
      POSTGRES_PASSWORD: civictext_dev
      POSTGRES_DB: civictext
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: civictext-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru  # 256MB dev limit — increase for heavy testing

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: civictext-redis-commander
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  postgres_data:

name: Build & Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: civictext
          POSTGRES_PASSWORD: civictext_test
          POSTGRES_DB: civictext_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --config ./prisma/prisma.config.mjs

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://civictext:civictext_test@localhost:5432/civictext_test?schema=public
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}
          AUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Docker Scout scanning
        uses: docker/scout-action@f8c776824083494ab0d56b8105ba2ca85c86e4de # v1
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          sarif-file: sarif.json
          summary: true

      - name: Upload Scout SARIF report
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        if: always()
        with:
          sarif_file: sarif.json
          category: docker-scout

  deploy-staging:
    needs: [build-and-push, scan-image]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and verify Docker image starts
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          docker run --rm -d --name health-check \
            -e AUTH_SECRET=${{ secrets.CI_AUTH_SECRET }} \
            -e DATABASE_URL=postgresql://test@localhost/test \
            -e REDIS_URL=redis://localhost:6379 \
            -p 3000:3000 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
          sleep 10
          curl -f http://localhost:3000/api/health || exit 1
          docker stop health-check

      - name: Run database migrations
        if: always()
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.STAGING_ENCRYPTION_KEY }}
          PRISMA_SKIP_VALIDATION_WARNING: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} \
            -e ENCRYPTION_KEY=${{ secrets.STAGING_ENCRYPTION_KEY }} \
            --entrypoint npx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging \
            prisma migrate deploy

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          # Add your deployment script/webhook here
          # Example: curl -X POST ${{ secrets.STAGING_DEPLOY_WEBHOOK }}

  deploy-production:
    needs: [build-and-push, scan-image]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and test Docker image health
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run --rm \
            -e AUTH_SECRET=test-key \
            -e DATABASE_URL=postgresql://test@localhost/test \
            -e REDIS_URL=redis://localhost:6379 \
            --entrypoint npm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest run build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.PRODUCTION_ENCRYPTION_KEY }}
          PRISMA_SKIP_VALIDATION_WARNING: true
        run: |
          docker run --rm \
            -e DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }} \
            -e ENCRYPTION_KEY=${{ secrets.PRODUCTION_ENCRYPTION_KEY }} \
            --entrypoint npx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            prisma migrate deploy

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Add your deployment script/webhook here
          # Example: curl -X POST ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK }}
